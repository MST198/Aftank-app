<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Aftank">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aftank registratie</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/equip-aftank.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/equip-aftank-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Equip Rental</p>
          <h1>Aftankbeurt</h1>
        </div>
        <div class="status-pill" id="pwaStatus">Offline klaar</div>
      </header>

      <main>
        <form id="fuelForm" novalidate>
          <section class="form-section" aria-labelledby="detailsTitle">
            <h2 id="detailsTitle">Gegevens</h2>

            <label class="field">
              <span>Klantnaam</span>
              <input id="customerName" name="customerName" autocomplete="organization" required>
              <small class="error-message" data-error-for="customerName"></small>
            </label>

            <label class="field">
              <span>Tanknummer / Machinenummer</span>
              <input id="assetNumber" name="assetNumber" autocomplete="off" required>
              <small class="error-message" data-error-for="assetNumber"></small>
            </label>

            <label class="field">
              <span>Aantal liters getankt</span>
              <input id="liters" name="liters" inputmode="decimal" required>
              <small class="error-message" data-error-for="liters"></small>
            </label>

            <fieldset class="field">
              <legend>Urenstand aanwezig?</legend>
              <div class="segmented-control" role="radiogroup" aria-label="Urenstand aanwezig">
                <label>
                  <input type="radio" name="hourMeterPresent" value="Ja" checked>
                  <span>Ja</span>
                </label>
                <label>
                  <input type="radio" name="hourMeterPresent" value="Nee">
                  <span>Nee</span>
                </label>
              </div>
            </fieldset>

            <label class="field" id="hourMeterField">
              <span>Urenstand</span>
              <input id="hourMeter" name="hourMeter" inputmode="decimal" required>
              <small class="error-message" data-error-for="hourMeter"></small>
            </label>
          </section>

          <section class="form-section" aria-labelledby="photosTitle">
            <h2 id="photosTitle">Foto's</h2>
            <label class="photo-picker">
              <input id="photos" name="photos" type="file" accept="image/*" capture="environment" multiple>
              <span class="photo-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 8a2 2 0 0 1 2-2h2l1.5-2h5L16 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3"/></svg>
              </span>
              <span>Foto's toevoegen</span>
            </label>
            <div class="photo-list" id="photoList" aria-live="polite"></div>
          </section>

          <section class="form-section" aria-labelledby="notesTitle">
            <h2 id="notesTitle">Afronding</h2>
            <label class="field">
              <span>Opmerkingen</span>
              <textarea id="notes" name="notes" rows="2"></textarea>
            </label>

            <label class="field">
              <span>App gebruiker</span>
              <input id="userName" name="userName" autocomplete="name">
            </label>
          </section>

          <div class="action-bar">
            <button class="secondary-button" type="reset">Wissen</button>
            <button class="primary-button" type="submit">
              <span aria-hidden="true">@</span>
              Mail maken
            </button>
          </div>
        </form>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js" defer></script>
  </body>
</html>
